message Transaction {
    // the date when the transaction happened, in format YYYY-MM-DD
    string date = 1;

    // the amount of the transaction, positive means received money, negative means spent money
    string amount = 2;

    // the account where the transaction happened
    // available values: "chaseXXXX", "chaseYYYY", "amazon", "apple", "applecard"...
    // NOTE: use placeholder account labels here — never commit real account numbers (see CLAUDE.md)
    string account = 3;

    // whether the transaction is a reference transaction
    bool is_reference = 4;

    // the original description of the transaction
    string original_description = 5;

    // the manually corrected description of the transaction
    string corrected_description = 6;

    // --- For labelled transactions only ---

    // the category of the transaction
    string category = 7;

    // tags of the transaction
    repeated string tags = 8;
}

